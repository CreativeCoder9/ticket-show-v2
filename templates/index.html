<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketShow - Book your show.</title>
    <link rel="stylesheet" href="{{url_for('static', filename='/css/bootstrap.css')}}">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800&amp;display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

    <!-- Some global custom css -->
    <style>
        a{
          color:#A37E44;
          text-decoration:none;
        }
        button:hover{
          color:#A37E44;
          text-decoration:none;
        }
        h1 {
        font-family: 'Raleway';
      }
        .card {
          box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
          padding-bottom: 30px;
          padding-top:10px;
        }
        .form-group{
         padding-top:10px;
         padding-bottom:10px;
         }
         .navlinks {
          padding: 10px;
        }
          #footer {
            color:white;
          }
        .btn a {
          color: white !important;
        }
    </style>  

  </head>
  <body>
    <!-- root element -->
    <div id="app" class="container">
      <router-link to="/"> Home </router-link>
      <router-link to="/profile/1"> Profile </router-link>
      <router-link to="/login" style="float: right"> Login </router-link>

      <router-view style="margin-top: 50px">
      </router-view>
      
    </div>
    <!-- footer -->
    <section id="footer">
        <div class="row align-items-center">
        <!-- venue card -->
        <div class="card col mx-1 align-items-center pb-0" style="background-color: #24285b;">
            <div class="card-body">
                <h6 class="card-title">Made with ❤ by Suman Ghosh.</h6>
            </div>
        </div>
    </section>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router@2.0.0/dist/vue-router.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script
    src="{{ url_for('static', filename='app.js') }}"
    type="module"
  ></script>
</html>
