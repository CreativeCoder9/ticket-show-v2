<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketShow - Book your show.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800&amp;display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

    <!-- Some global custom css -->
    <style>
        a{
          color:#A37E44;
          text-decoration:none;
        }
        button:hover{
          color:#A37E44;
          text-decoration:none;
        }
        h1, h2, h3, h4, h5, h6 {
          font-family: 'Righteous', cursive;
      }
        .card {
          box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
          padding-bottom: 30px;
          padding-top:10px;
        }
        .form-group{
         padding-top:10px;
         padding-bottom:10px;
         }
         .navlinks {
          padding: 10px;
        }
          #footer {
            color:white;
          }
        .btn a {
          color: white !important;
        }
        p {
          font-family: 'Raleway';
        }
    </style>  

  </head>

<body>
<section id="statistics" class="card" style="margin-top:20px; margin-bottom:20px;">
    <div class="container mb-5 pb-5 min-vh-100">
        <div class="card-header">
            <h6>Today's date: {{ date }}</h6>
        </div>
        <div class="card-body">
            <h1>Hey! Long time no see!</h1>
            <p>It's time to book a ticket! Come back soon!</p>
        </div>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>
